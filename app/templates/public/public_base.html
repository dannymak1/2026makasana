{% extends "base.html" %}
{% block content %}
<header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4">
        <div class="flex items-center justify-between">
            <h1 class="text-2xl md:text-xl font-semibold text-slate-900 leading-tight">Makasana Consultancy</h1>
            <button
                id="mobile-menu-button"
                type="button"
                class="lg:hidden inline-flex items-center justify-center rounded-lg border border-slate-300 p-2 text-slate-700 hover:bg-slate-50"
                aria-label="Toggle menu"
                aria-controls="mobile-menu"
                aria-expanded="false"
            >
                <svg id="icon-open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                <svg id="icon-close" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <nav class="hidden lg:flex gap-2 text-sm mt-4 items-center justify-end">
            <a
                class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.home' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                href="{{ url_for('public.home') }}"
            >Home</a>
            <a
                class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.services' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                href="{{ url_for('public.services') }}"
            >Services</a>
            <a
                class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.blog' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                href="{{ url_for('public.blog') }}"
            >Blog</a>
            <a
                class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.contact' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                href="{{ url_for('public.contact') }}"
            >Contact</a>
            <a
                class="{% if request.endpoint == 'auth.login' %}bg-indigo-700{% else %}bg-indigo-600{% endif %} text-white text-center px-4 py-2 rounded-lg hover:bg-indigo-700 col-span-2 sm:col-span-1"
                href="{{ url_for('auth.login') }}"
            >Login</a>
        </nav>

        <nav id="mobile-menu" class="hidden lg:hidden mt-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                <a
                    class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.home' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                    href="{{ url_for('public.home') }}"
                >Home</a>
                <a
                    class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.services' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                    href="{{ url_for('public.services') }}"
                >Services</a>
                <a
                    class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.blog' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                    href="{{ url_for('public.blog') }}"
                >Blog</a>
                <a
                    class="text-center px-3 py-2 rounded-lg hover:text-indigo-600 {% if request.endpoint == 'public.contact' %}bg-indigo-50 text-indigo-700 font-medium{% endif %}"
                    href="{{ url_for('public.contact') }}"
                >Contact</a>
                <a
                    class="{% if request.endpoint == 'auth.login' %}bg-indigo-700{% else %}bg-indigo-600{% endif %} text-white text-center px-4 py-2 rounded-lg hover:bg-indigo-700 sm:col-span-2"
                    href="{{ url_for('auth.login') }}"
                >Login</a>
            </div>
        </nav>
    </div>
</header>

<script>
    (function () {
        const button = document.getElementById("mobile-menu-button");
        const menu = document.getElementById("mobile-menu");
        const iconOpen = document.getElementById("icon-open");
        const iconClose = document.getElementById("icon-close");
        if (!button || !menu || !iconOpen || !iconClose) return;

        button.addEventListener("click", function () {
            const isOpen = !menu.classList.contains("hidden");
            menu.classList.toggle("hidden");
            iconOpen.classList.toggle("hidden");
            iconClose.classList.toggle("hidden");
            button.setAttribute("aria-expanded", String(!isOpen));
        });
    })();
</script>
<script src="https://concierge.bluecranelimited.com/jua-widget.js?widget_id=21d9b5f9-411c-4145-8e47-a6ac513e91ea"></script>
<script>
    (function () {
        if (window.__mkJuaWidgetInjected) return;
        window.__mkJuaWidgetInjected = true;
        var existing = document.querySelector('script[src*="concierge.bluecranelimited.com/jua-widget.js"]');
        if (existing) return;
        var s = document.createElement("script");
        s.src = "https://concierge.bluecranelimited.com/jua-widget.js?widget_id=21d9b5f9-411c-4145-8e47-a6ac513e91ea";
        s.async = true;
        document.body.appendChild(s);
    })();
</script>

{% block public_content %}{% endblock %}
{% endblock %}
