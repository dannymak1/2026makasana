<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/images/makasana-consultancy-favicon.png') }}">
    <title>{% block title %}Makasana{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/makasana-brand.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <style>
        .mk-sidebar { background: rgb(var(--mk-deep-rgb)); color: #fff; }
        .mk-sidebar-muted { color: #c8e6d9; }
        .mk-nav-active { background: rgba(0, 0, 0, 0.22); color: #fff; }
        .mk-nav-link:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }
        .mk-page-title { color: var(--mk-dark); }
        .mk-card { background: #fff; border: 1px solid #e2ebe4; box-shadow: 0 4px 12px rgba(20, 61, 50, 0.06); }
        .mk-btn-primary { background: var(--mk-btn-solid); color: #fff; }
        .mk-btn-primary:hover { background: var(--mk-btn-solid-hover); }
        .mk-btn-secondary { border: 1px solid var(--mk-primary); color: var(--mk-btn-solid); }
        .mk-btn-secondary:hover { background: rgba(var(--mk-primary-rgb), 0.12); }
        .mk-link { color: var(--mk-btn-solid); }
        .mk-link:hover { color: var(--mk-btn-solid-hover); }
        .mk-table-head { background: rgb(var(--mk-soft-rgb)); }
        .mk-table-head th { color: var(--mk-dark); }
        .mk-table-row:hover { background: rgba(var(--mk-primary-rgb), 0.08); }
    </style>
</head>
<body class="text-slate-800" style="background-color: var(--mk-light);">
    {% with messages = get_flashed_messages(with_categories=true) %}
    <script>
        window.mkFlashMessages = {{ messages|tojson }};
    </script>
    {% endwith %}
    <script>
        (function () {
            const alerts = window.mkFlashMessages || [];
            if (!alerts.length || typeof Swal === "undefined") return;
            alerts.forEach((item) => {
                const category = item[0] || "info";
                const message = item[1] || "";
                let icon = "info";
                if (category === "success") icon = "success";
                else if (category === "error") icon = "error";
                else if (category === "warning") icon = "warning";
                Swal.fire({
                    toast: true,
                    position: "top-end",
                    icon: icon,
                    title: message,
                    showConfirmButton: false,
                    timer: 6000,
                    timerProgressBar: true,
                    didOpen: (toast) => {
                        toast.addEventListener("mouseenter", Swal.stopTimer);
                        toast.addEventListener("mouseleave", Swal.resumeTimer);
                    },
                });
            });
        })();
    </script>
    {% block content %}{% endblock %}
</body>
</html>
